<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#2ABFBF",
      "grid": true,
      "headingFont": "Syne"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [page, setPage] = useState('home');

      // Apply accent color overrides via CSS custom property
      useEffect(() => {
        document.documentElement.style.setProperty('--accent', t.accent);
      }, [t.accent]);

      const pageMap = {
        home:      <HomePage setPage={setPage} />,
        episodes:  <EpisodesPage />,
        guests:    <GuestsPage />,
        resources: <ResourcesPage />,
        sponsors:  <SponsorsPage />,
        about:     <AboutPage />,
      };

      return (
        <div style={{ minHeight:'100vh', background:'#070d18' }}>
          {/* Global blueprint grid overlay (toggleable) */}
          {t.grid && (
            <div style={{
              position:'fixed', inset:0, zIndex:0, pointerEvents:'none',
              backgroundImage:`
                linear-gradient(rgba(42,191,191,0.018) 1px,transparent 1px),
                linear-gradient(90deg,rgba(42,191,191,0.018) 1px,transparent 1px)`,
              backgroundSize:'64px 64px',
            }}/>
          )}

          <div style={{ position:'relative', zIndex:1 }}>
            <Header page={page} setPage={setPage}/>

            <main style={{ paddingTop:'0' }}>
              {pageMap[page] || pageMap.home}
            </main>

            <Footer setPage={setPage}/>
          </div>

          {/* Tweaks panel */}
          <TweaksPanel>
            <TweakSection label="Color de Acento"/>
            <TweakColor
              label="Color Principal"
              value={t.accent}
              options={['#2ABFBF','#F07A2A','#4a90d9','#8a5cf5']}
              onChange={v => setTweak('accent', v)}
            />
            <TweakSection label="Fondo"/>
            <TweakToggle
              label="Grilla Técnica"
              value={t.grid}
              onChange={v => setTweak('grid', v)}
            />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
